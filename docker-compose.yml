services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - botnet

  # Laravel 13 + Inertia/React dashboard (replaces the old Streamlit `dashboard`
  # service). The app currently lives in the darzbot repo — adjust the build
  # path if you move it into this repo as ./webapp.
  webapp:
    build: ../../LARAVEL/darzbot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # APP_KEY must be set in .env (see .env.example)
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=tradingbot
      - DB_USERNAME=botuser
      - DB_PASSWORD=botpass
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - MAIL_MAILER=log
      # MT5_BRIDGE_URL comes from .env; when unset, the app derives it from
      # VM_IP/VM_PORT (same variables the bot uses). The Windows VM must be
      # reachable FROM INSIDE this container — a host-only VM adapter that only
      # the docker host can reach will not work; use a bridged/shared network.
    depends_on:
      db:
        condition: service_healthy
    networks:
      - botnet

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradingbot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d tradingbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - botnet

volumes:
  pgdata:

networks:
  botnet:
